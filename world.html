    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">

        <i data-lucide="home" style="width:22px;height:22px;color:#555;"></i>
        <span style="font-size:11px;color:#555;font-weight:500;">主页</span>
      </div>
      <div onclick="location.href='chat.html'" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:14px;background:#f5f5f5;cursor:pointer;">
        <i data-lucide="message-circle" style="width:22px;height:22px;color:#555;"></i>

      </div>
      <div onclick="location.href='world.html'" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:14px;background:#f5f5f5;cursor:pointer;">
        <i data-lucide="globe" style="width:22px;height:22px;color:#555;"></i>

      </div>
      <div onclick="location.href='collect.html'" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:14px;background:#f5f5f5;cursor:pointer;">

        <span style="font-size:11px;color:#555;font-weight:500;">收藏</span>
      </div>
<div onclick="location.href='memory.html'" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:14px;background:#f5f5f5;cursor:pointer;">
  <i data-lucide="brain" style="width:22px;height:22px;color:#555;"></i>
  <span style="font-size:11px;color:#555;font-weight:500;">记忆</span>
</div>
      <div onclick="location.href='random.html'" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:14px;background:#f5f5f5;cursor:pointer;">

        <span style="font-size:11px;color:#555;font-weight:500;">论坛</span>
      </div>
      <div onclick="location.href='novel.html'" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:14px;background:#f5f5f5;cursor:pointer;">

      </div>
    </div>
  </div>
</div>
</div>
<script>
function openQuickNav() {
  const el = document.getElementById('quick-nav-mask');
  if (el) {
    el.style.display = 'block';
    const isDark = document.body.classList.contains('dark');
    const panel = el.querySelector('div[onclick="event.stopPropagation()"]');
    if (panel) {
      panel.style.background = isDark ? '#1e1e1e' : '#fff';
      panel.querySelectorAll('div[style*="background:#f5f5f5"]').forEach(item => {
        item.style.background = isDark ? '#2a2a2a' : '#f5f5f5';
      });
      panel.querySelectorAll('span[style*="color:#555"]').forEach(label => {
        label.style.color = isDark ? '#ccc' : '#555';
      });
      panel.querySelectorAll('div[style*="color:#111"]').forEach(title => {
        title.style.color = isDark ? '#eee' : '#111';
      });
    }
    if(typeof lucide !== 'undefined') lucide.createIcons();
  }
}
function closeQuickNav() {
  const el = document.getElementById('quick-nav-mask');
  if (el) el.style.display = 'none';
}
</script>
<script>
const _origCreateApp = Vue.createApp;
if (typeof lucide !== 'undefined') {
  const _iconObserver = new MutationObserver(() => {
    clearTimeout(window._iconTimer);
    window._iconTimer = setTimeout(() => lucide.createIcons(), 30);
  });
  document.addEventListener('DOMContentLoaded', () => {
    _iconObserver.observe(document.body, { childList: true, subtree: true });
    lucide.createIcons();
  });
}
</script>
<script src="db.js"></script>
<script src="world.js"></script>
</body>
</html>
